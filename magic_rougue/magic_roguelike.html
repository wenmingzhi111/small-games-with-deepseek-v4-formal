<html lang="zh-CN">
<head>

<title>奥术废墟 · 魔法生存 Roguelike</title>
<!-- ============================================================
     奥术废墟 (Arcane Ruins) — 单文件 / 免构建 3D 魔法生存 Roguelike
     技术栈：原生 HTML + CSS + JS，CDN 引入 Three.js
     架构：模块化（IIFE 命名空间），每个系统独立且带完整中文注释
     ============================================================ -->
<style>
/* ========================= 全局基础样式 ========================= */
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#05060a; font-family:'Segoe UI','Microsoft YaHei',sans-serif; color:#e8eaf2; }
#gameCanvas { display:block; position:fixed; top:0; left:0; z-index:0; }

/* 通用文字发光 */
.glow { text-shadow:0 0 8px currentColor; }

/* ========================= 顶层 UI 容器 ========================= */
#ui { position:fixed; inset:0; z-index:10; pointer-events:none; }
#ui * { pointer-events:auto; }

/* ------------------------- HUD ------------------------- */
#hud { position:fixed; left:20px; bottom:20px; width:340px; z-index:15; opacity:0; transition:opacity .4s; }
#hud.active { opacity:1; }
.bar-wrap { margin-bottom:7px; position:relative; }
.bar-label { font-size:11px; letter-spacing:1px; margin-bottom:2px; display:flex; justify-content:space-between; text-transform:uppercase; opacity:.85; }
.bar-bg { height:16px; border-radius:9px; background:rgba(10,12,20,.75); border:1px solid rgba(255,255,255,.15); overflow:hidden; box-shadow:inset 0 0 6px rgba(0,0,0,.6); }
.bar-fill { height:100%; width:100%; border-radius:9px; transition:width .25s ease; }
#hpFill { background:linear-gradient(90deg,#ff2e4d,#ff6b6b); box-shadow:0 0 12px #ff3b5c; }
#mpFill { background:linear-gradient(90deg,#2e6bff,#4fc3ff); box-shadow:0 0 12px #3a8dff; }
#xpFill { background:linear-gradient(90deg,#b06bff,#f0a6ff); box-shadow:0 0 12px #c17bff; }
.bar-bg.small { height:11px; }

/* 等级徽章 */
#levelBadge { position:absolute; right:-8px; top:-46px; width:56px; height:56px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#3a3560,#161328); border:2px solid #b06bff;
  display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 0 18px #8a4dff; }
#levelBadge .lv-txt { font-size:9px; letter-spacing:1px; opacity:.7; }
#levelBadge .lv-num { font-size:22px; font-weight:bold; color:#f0a6ff; text-shadow:0 0 10px #c17bff; line-height:1; }

/* ------------------------- 属性面板（右上） ------------------------- */
#stats { position:fixed; right:20px; top:20px; z-index:15; background:rgba(12,14,24,.6); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 16px; font-size:13px; min-width:160px; opacity:0; transition:opacity .4s; }
#stats.active { opacity:1; }
#stats .stat-row { display:flex; justify-content:space-between; margin:3px 0; }
#stats .stat-row span:first-child { opacity:.7; }
#stats .stat-row span:last-child { font-weight:bold; color:#ffd27a; }
#waveInfo { text-align:center; margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,.12); font-size:14px; }
#waveInfo b { color:#ff8a5c; font-size:18px; }

/* ------------------------- 技能快捷栏（底部中央） ------------------------- */
#skillBar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); display:flex; gap:14px; z-index:15; opacity:0; transition:opacity .4s; }
#skillBar.active { opacity:1; }
.skill-slot { width:62px; height:62px; border-radius:12px; background:rgba(15,17,28,.8); border:2px solid rgba(255,255,255,.18);
  display:flex; align-items:center; justify-content:center; font-size:28px; position:relative; box-shadow:0 4px 14px rgba(0,0,0,.5); transition:transform .1s; }
.skill-slot .key { position:absolute; top:-9px; left:-9px; width:22px; height:22px; border-radius:6px; background:#222436;
  border:1px solid rgba(255,255,255,.25); font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
.skill-slot .cd { position:absolute; inset:0; background:rgba(5,6,12,.78); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold; color:#fff; }
.skill-slot.ready { border-color:#5fd0ff; }
.skill-slot.casting { transform:scale(1.12); }

/* ------------------------- 亮度滑块（左上） ------------------------- */
#settings { position:fixed; left:20px; top:20px; z-index:15; background:rgba(12,14,24,.6); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:10px 14px; font-size:12px; opacity:0; transition:opacity .4s; }
#settings.active { opacity:1; }
#settings label { display:block; margin-bottom:5px; opacity:.8; }
#brightness { width:150px; accent-color:#b06bff; cursor:pointer; }

/* ------------------------- 背包（I 键） ------------------------- */
#inventory { position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center; background:rgba(3,4,10,.72); backdrop-filter:blur(4px); }
#inventory.open { display:flex; }
.inv-panel { width:560px; background:linear-gradient(160deg,#12142a,#0a0b16); border:1px solid rgba(176,107,255,.4);
  border-radius:16px; padding:24px; box-shadow:0 0 40px rgba(138,77,255,.3); }
.inv-panel h2 { font-size:20px; margin-bottom:14px; color:#c9b3ff; letter-spacing:2px; }
.inv-section-title { font-size:12px; opacity:.6; margin:14px 0 8px; letter-spacing:1px; text-transform:uppercase; }
.slot-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.inv-slot { aspect-ratio:1; border-radius:10px; background:rgba(20,22,38,.9); border:1px solid rgba(255,255,255,.12);
  display:flex; align-items:center; justify-content:center; font-size:26px; position:relative; cursor:help; transition:transform .12s,border-color .12s; }
.inv-slot.filled { border-color:#ffd27a; box-shadow:0 0 12px rgba(255,210,122,.4); }
.inv-slot.filled:hover { transform:scale(1.08); border-color:#fff; }
.inv-hint { font-size:12px; opacity:.55; margin-top:16px; text-align:center; }

/* 悬浮气泡说明 */
#tooltip { position:fixed; z-index:60; max-width:240px; background:rgba(8,9,18,.96); border:1px solid #b06bff;
  border-radius:10px; padding:10px 12px; font-size:12px; pointer-events:none; display:none; box-shadow:0 0 18px rgba(138,77,255,.5); }
#tooltip .tt-name { color:#ffd27a; font-weight:bold; font-size:13px; margin-bottom:4px; }
#tooltip .tt-desc { opacity:.85; line-height:1.5; }

/* ------------------------- 菜单 / 结算 ------------------------- */
.screen { position:fixed; inset:0; z-index:40; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 40%,rgba(30,20,60,.85),rgba(3,4,10,.97)); text-align:center; }
.screen.hidden { display:none; }
.screen h1 { font-size:54px; letter-spacing:6px; margin-bottom:6px;
  background:linear-gradient(90deg,#b06bff,#ff6bcb,#5fd0ff); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 30px rgba(138,77,255,.4); }
.screen .subtitle { font-size:15px; opacity:.6; letter-spacing:3px; margin-bottom:40px; }
.btn { min-width:220px; padding:14px 30px; margin:8px; font-size:16px; letter-spacing:2px; cursor:pointer;
  background:linear-gradient(90deg,rgba(138,77,255,.25),rgba(95,208,255,.25)); border:1px solid rgba(176,107,255,.6);
  border-radius:10px; color:#fff; transition:all .18s; }
.btn:hover { background:linear-gradient(90deg,rgba(138,77,255,.55),rgba(95,208,255,.55)); transform:translateY(-2px); box-shadow:0 6px 20px rgba(138,77,255,.4); }
.btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
.save-info { margin-top:24px; font-size:13px; opacity:.55; line-height:1.7; }
#gameOverStats { font-size:16px; line-height:2; margin:20px 0 30px; opacity:.9; }
#gameOverStats b { color:#ffd27a; }

/* 十字准星 */
#crosshair { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:12; width:22px; height:22px; opacity:0; transition:opacity .4s; }
#crosshair.active { opacity:.8; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(255,255,255,.8); box-shadow:0 0 4px #5fd0ff; }
#crosshair::before { left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
#crosshair::after { top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }

/* 受击红色屏闪 */
#damageVignette { position:fixed; inset:0; z-index:11; pointer-events:none; opacity:0;
  box-shadow:inset 0 0 160px 60px rgba(255,0,30,.7); transition:opacity .15s; }

/* 视角提示 & 帮助 */
#hint { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:14; font-size:13px; opacity:0; transition:opacity .5s; background:rgba(8,9,18,.7); padding:8px 18px; border-radius:20px; }
#hint.show { opacity:.9; }

/* 飘字层（3D 投影到屏幕） */
#floatLayer { position:fixed; inset:0; z-index:13; pointer-events:none; overflow:hidden; }
.float-txt { position:absolute; font-weight:bold; font-size:20px; text-shadow:0 0 6px #000,0 2px 3px #000; will-change:transform,opacity; }

/* 加载提示 */
#loading { position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; background:#05060a; font-size:18px; letter-spacing:3px; color:#b06bff; }
</style>

<!-- Three.js CDN（r160，含 ES Module import map） -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }

<script type="module">
import * as THREE from 'three';

/* =====================================================================================
   模块 0：工具函数 Utils
   ===================================================================================== */
const Utils = {
  clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),
  lerp:(a,b,t)=>a+(b-a)*t,
  rand:(a,b)=>a+Math.random()*(b-a),
  randInt:(a,b)=>Math.floor(a+Math.random()*(b-a+1)),
  dist2D:(a,b)=>Math.hypot(a.x-b.x,a.z-b.z),
  now:()=>performance.now()/1000,
};

/* =====================================================================================
   模块 1：音频系统 Audio —— 纯 Web Audio API 代码合成，无外部资源
   包含：氛围背景音、施法破空、电击、受击重击、升级提示
   ===================================================================================== */
const Audio = (()=>{
  let ctx=null, master=null, ambientGain=null, started=false;

  function init(){
    if(ctx) return;
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value=0.6; master.connect(ctx.destination);
  }
  // 用户交互后必须 resume
  function ensure(){ init(); if(ctx.state==='suspended') ctx.resume(); }

  // 低沉持续的氛围背景音（两个低频振荡 + 缓慢 LFO 起伏）
  function startAmbient(){
    if(started) return; ensure(); started=true;
    ambientGain = ctx.createGain(); ambientGain.gain.value=0; ambientGain.connect(master);
    ambientGain.gain.linearRampToValueAtTime(0.14, ctx.currentTime+3);
    [55,58.27,82.4].forEach((f,i)=>{
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ctx.createGain(); g.gain.value=0.4/(i+1);
      const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.05+i*0.03;
      const lfoG=ctx.createGain(); lfoG.gain.value=0.15;
      lfo.connect(lfoG); lfoG.connect(g.gain);
      o.connect(g); g.connect(ambientGain); o.start(); lfo.start();
    });
  }

  // 通用包络播放
  function tone({freq=440,type='sine',dur=0.2,vol=0.3,attack=0.005,slideTo=null}){
    ensure();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,ctx.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,ctx.currentTime+dur);
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol,ctx.currentTime+attack);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+dur+0.02);
  }
  // 白噪声爆发（用于破空 / 受击）
  function noise({dur=0.2,vol=0.3,freq=1000,q=1}){
    ensure();
    const len=ctx.sampleRate*dur, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q;
    const g=ctx.createGain(); g.gain.value=vol;
    src.connect(f); f.connect(g); g.connect(master); src.start();
  }

  return {
    startAmbient, ensure,
    castFire:()=>{ tone({freq:180,type:'sawtooth',dur:0.3,vol:0.25,slideTo:60}); noise({dur:0.25,vol:0.15,freq:800}); },
    castFrost:()=>{ tone({freq:900,type:'triangle',dur:0.4,vol:0.2,slideTo:300}); tone({freq:1400,type:'sine',dur:0.3,vol:0.1}); },
    castLightning:()=>{ noise({dur:0.18,vol:0.35,freq:3000,q:0.7}); tone({freq:2000,type:'square',dur:0.12,vol:0.15,slideTo:400}); },
    hit:()=>{ noise({dur:0.12,vol:0.25,freq:400,q:1.5}); tone({freq:120,type:'square',dur:0.1,vol:0.2,slideTo:50}); },
    playerHurt:()=>{ tone({freq:200,type:'sawtooth',dur:0.25,vol:0.3,slideTo:80}); noise({dur:0.2,vol:0.2,freq:300}); },
    levelUp:()=>{ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone({freq:f,type:'triangle',dur:0.3,vol:0.25}),i*90)); },
    pickup:()=>{ tone({freq:880,type:'sine',dur:0.15,vol:0.2,slideTo:1320}); },
    enemyDie:()=>{ tone({freq:300,type:'sawtooth',dur:0.3,vol:0.2,slideTo:40}); noise({dur:0.25,vol:0.12,freq:600}); },
  };
})();

/* =====================================================================================
   模块 2：存档系统 Save —— localStorage 持久化
   保存：等级 / 最大生命 / 当前经验 / 已获被动 / 最高波次
   ===================================================================================== */
const Save = (()=>{
  const KEY='arcane_ruins_save_v1';
  return {
    exists(){ return !!localStorage.getItem(KEY); },
    load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } },
    write(data){ localStorage.setItem(KEY, JSON.stringify(data)); },
    clear(){ localStorage.removeItem(KEY); },
  };
})();

/* =====================================================================================
   模块 3：飘字系统 FloatingText —— 将 3D 世界坐标投影到屏幕显示伤害数字
   ===================================================================================== */
const FloatText = (()=>{
  const layer=document.getElementById('floatLayer');
  const list=[]; // {el, worldPos, life, maxLife, vy}
  function spawn(worldPos, text, color, crit=false){
    const el=document.createElement('div');
    el.className='float-txt'; el.textContent=text; el.style.color=color;
    if(crit){ el.style.fontSize='30px'; el.textContent='暴击 '+text; }
    layer.appendChild(el);
    list.push({el, wp:worldPos.clone(), life:1.1, max:1.1, vy:1.6, offX:Utils.rand(-14,14)});
  }
  // 每帧更新：投影 + 上浮 + 淡出
  function update(dt, camera){
    for(let i=list.length-1;i>=0;i--){
      const f=list[i]; f.life-=dt; f.wp.y+=f.vy*dt; f.vy*=0.96;
      if(f.life<=0){ f.el.remove(); list.splice(i,1); continue; }
      const p=f.wp.clone().project(camera);
      if(p.z>1){ f.el.style.display='none'; continue; } // 在相机背后
      f.el.style.display='block';
      const x=(p.x*0.5+0.5)*innerWidth+f.offX, y=(-p.y*0.5+0.5)*innerHeight;
      const t=f.life/f.max;
      f.el.style.transform=`translate(${x}px,${y}px) scale(${0.8+0.4*t})`;
      f.el.style.opacity=Utils.clamp(t*1.4,0,1);
    }
  }
  function clear(){ list.forEach(f=>f.el.remove()); list.length=0; }
  return {spawn, update, clear};
})();

/* =====================================================================================
   模块 4：粒子系统 Particles —— Three.js Points，用于爆炸 / 溶解 / 施法
   ===================================================================================== */
class ParticleBurst {
  constructor(scene, pos, {count=30, color=0xff6633, size=0.3, speed=6, life=0.8, gravity=-4}={}){
    this.life=life; this.max=life; this.gravity=gravity;
    const g=new THREE.BufferGeometry();
    const positions=new Float32Array(count*3);
    this.vel=[];
    for(let i=0;i<count;i++){
      positions[i*3]=pos.x; positions[i*3+1]=pos.y; positions[i*3+2]=pos.z;
      const dir=new THREE.Vector3(Utils.rand(-1,1),Utils.rand(-0.2,1),Utils.rand(-1,1)).normalize();
      this.vel.push(dir.multiplyScalar(Utils.rand(speed*0.3,speed)));
    }
    g.setAttribute('position',new THREE.BufferAttribute(positions,3));
    const m=new THREE.PointsMaterial({color,size,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
    this.points=new THREE.Points(g,m); this.scene=scene; scene.add(this.points);
  }
  update(dt){
    this.life-=dt;
    const pos=this.points.geometry.attributes.position.array;
    for(let i=0;i<this.vel.length;i++){
      this.vel[i].y+=this.gravity*dt;
      pos[i*3]+=this.vel[i].x*dt; pos[i*3+1]+=this.vel[i].y*dt; pos[i*3+2]+=this.vel[i].z*dt;
    }
    this.points.geometry.attributes.position.needsUpdate=true;
    this.points.material.opacity=Utils.clamp(this.life/this.max,0,1);
    return this.life>0;
  }
  dispose(){ this.scene.remove(this.points); this.points.geometry.dispose(); this.points.material.dispose(); }
}

/* =====================================================================================
   模块 5：装备定义 Equipment —— 被动装备数据库
   ===================================================================================== */
const EQUIP_DB={
  vampire:{ id:'vampire', name:'吸血戒指', icon:'💍', desc:'每次命中敌人回复 3 点生命值。鲜血的低语从不停歇。', apply:s=>{ s.lifesteal+=3; } },
  boots:  { id:'boots',   name:'神速之靴', icon:'👢', desc:'移动速度提升 25%。踏风而行，如影随形。', apply:s=>{ s.speedMul+=0.25; } },
  focus:  { id:'focus',   name:'奥术焦点', icon:'🔮', desc:'所有技能法力消耗降低 30%。心念合一，法力奔涌。', apply:s=>{ s.mpCostMul*=0.7; } },
  amulet: { id:'amulet',  name:'烈焰护符', icon:'📿', desc:'攻击力提升 20%。灼热之力灌注每一次施法。', apply:s=>{ s.atkMul+=0.20; } },
  crown:  { id:'crown',   name:'贤者之冠', icon:'👑', desc:'暴击率提升 15%。洞悉弱点，一击致命。', apply:s=>{ s.crit+=0.15; } },
};
const EQUIP_KEYS=Object.keys(EQUIP_DB);

/* =====================================================================================
   模块 6：游戏主体 Game —— 场景、玩家、战斗、敌人、波次、主循环
   ===================================================================================== */
const Game=(()=>{
  // --- Three.js 核心对象 ---
  let renderer, scene, camera, clock;
  let ambientLight, hemiLight;
  // --- 运行状态 ---
  let running=false, paused=false;
  // --- 玩家 ---
  const player={
    obj:null,           // 玩家 3D 组
    pos:new THREE.Vector3(0,1,0),
    yaw:0, pitch:0,     // 视角
    thirdPerson:true,   // 第三/第一人称
    // 属性
    hp:100,maxHp:100, mp:100,maxMp:100, xp:0, xpNext:100, level:1,
    baseAtk:10, atkMul:1, baseSpeed:6, speedMul:1, crit:0.10,
    lifesteal:0, mpCostMul:1,
    equips:[],          // 已获被动 id 列表
    invuln:0,           // 无敌帧计时
  };
  // --- 集合 ---
  let enemies=[], projectiles=[], particles=[], drops=[];
  let crystals=[];      // 场景发光水晶（用于动画）
  // --- 波次 ---
  let wave=0, waveHighest=0, spawnQueue=[], waveActive=false, waveClearTimer=0;
  // --- 输入 ---
  const keys={};
  let mouseDown=false;
  // --- 技能冷却 ---
  const skills=[
    {name:'火球术', cd:0.6,  timer:0, mp:12, cast:castFireball},
    {name:'冰霜新星',cd:5.0,  timer:0, mp:30, cast:castFrostNova},
    {name:'闪电冲刺',cd:3.5,  timer:0, mp:20, cast:castLightningDash},
  ];

  /* ---------------- 场景构建 ---------------- */
  function buildScene(){
    const canvas=document.getElementById('gameCanvas');
    renderer=new THREE.WebGLRenderer({canvas,antialias:true});
    renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a0a16);
    // 体积雾：营造神秘废墟氛围
    scene.fog=new THREE.FogExp2(0x0a0a1e,0.028);

    camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,300);
    clock=new THREE.Clock();

    // 光照：环境 + 半球 + 主方向光
    ambientLight=new THREE.AmbientLight(0x334466,0.6); scene.add(ambientLight);
    hemiLight=new THREE.HemisphereLight(0x8a6bff,0x110a22,0.5); scene.add(hemiLight);
    const dir=new THREE.DirectionalLight(0xb0a0ff,0.5);
    dir.position.set(20,40,10); dir.castShadow=true;
    dir.shadow.camera.left=-40; dir.shadow.camera.right=40; dir.shadow.camera.top=40; dir.shadow.camera.bottom=-40;
    dir.shadow.mapSize.set(1024,1024); scene.add(dir);

    buildArena();
    buildPlayer();
  }

  // 古老魔法废墟竞技场：地面、碎石柱、发光水晶
  function buildArena(){
    // 地面（暗色石板 + 圆形边界）
    const groundGeo=new THREE.CircleGeometry(50,64);
    const groundMat=new THREE.MeshStandardMaterial({color:0x1a1a2a,roughness:0.9,metalness:0.1});
    const ground=new THREE.Mesh(groundGeo,groundMat); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    // 中央符文圆环（发光）
    const ringGeo=new THREE.RingGeometry(6,7,64);
    const ringMat=new THREE.MeshBasicMaterial({color:0x6b4dff,side:THREE.DoubleSide,transparent:true,opacity:0.5});
    const ring=new THREE.Mesh(ringGeo,ringMat); ring.rotation.x=-Math.PI/2; ring.position.y=0.02; scene.add(ring);

    // 碎石柱（随机分布在外圈）
    const pillarMat=new THREE.MeshStandardMaterial({color:0x2a2838,roughness:0.85});
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2, r=Utils.rand(22,34);
      const h=Utils.rand(4,9);
      const geo=new THREE.CylinderGeometry(Utils.rand(0.8,1.3),Utils.rand(1.2,1.8),h,8);
      const p=new THREE.Mesh(geo,pillarMat);
      p.position.set(Math.cos(a)*r, h/2-Utils.rand(0.5,2), Math.sin(a)*r);
      p.rotation.z=Utils.rand(-0.15,0.15); p.castShadow=true; p.receiveShadow=true;
      scene.add(p);
    }

    // 发光水晶（带点光源 + 悬浮动画）
    const crystalGeo=new THREE.OctahedronGeometry(1,0);
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, r=Utils.rand(14,26);
      const hue=Utils.rand(0,1);
      const col=new THREE.Color().setHSL(0.6+hue*0.25,0.9,0.6);
      const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.4,roughness:0.2,metalness:0.4,transparent:true,opacity:0.9});
      const c=new THREE.Mesh(crystalGeo,mat);
      c.position.set(Math.cos(a)*r, Utils.rand(1.5,3), Math.sin(a)*r);
      c.scale.setScalar(Utils.rand(0.8,1.6)); c.castShadow=true;
      const light=new THREE.PointLight(col,2.5,18); c.add(light);
      scene.add(c);
      crystals.push({mesh:c, baseY:c.position.y, phase:Utils.rand(0,6.28)});
    }
  }

  // 玩家模型：法师体（袍身 + 头 + 悬浮法杖球）
  function buildPlayer(){
    const g=new THREE.Group();
    const bodyMat=new THREE.MeshStandardMaterial({color:0x3a5bd0,emissive:0x1a2a66,emissiveIntensity:0.4,roughness:0.6});
    const body=new THREE.Mesh(new THREE.ConeGeometry(0.6,1.6,8),bodyMat); body.position.y=0.8; body.castShadow=true; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.32,16,16),new THREE.MeshStandardMaterial({color:0xf0d0a0,roughness:0.7})); head.position.y=1.75; head.castShadow=true; g.add(head);
    // 法师帽
    const hat=new THREE.Mesh(new THREE.ConeGeometry(0.4,0.7,8),new THREE.MeshStandardMaterial({color:0x2a3a90,emissive:0x1a2a66,emissiveIntensity:0.3})); hat.position.y=2.15; g.add(hat);
    // 悬浮法球（发光）
    const orb=new THREE.Mesh(new THREE.SphereGeometry(0.18,12,12),new THREE.MeshBasicMaterial({color:0x5fd0ff}));
    orb.position.set(0.55,1.1,0.3); g.add(orb);
    const orbLight=new THREE.PointLight(0x5fd0ff,2,8); orb.add(orbLight);
    player.orb=orb;
    g.position.copy(player.pos); scene.add(g); player.obj=g;
  }

  /* ---------------- 敌人系统 ---------------- */
  const ENEMY_TYPES={
    zombie:{ hp:30, speed:2.2, dmg:8, atkRange:1.8, atkCd:1.2, color:0x4a7a3a, xp:15, scale:1, ranged:false },
    cultist:{ hp:20, speed:2.8, dmg:12, atkRange:16, atkCd:2.2, color:0x8a2ac0, xp:25, scale:0.9, ranged:true },
    giant:{ hp:200, speed:1.3, dmg:30, atkRange:3.5, atkCd:2.5, color:0x8a3a1a, xp:120, scale:2.4, ranged:false, telegraph:true },
  };

  function spawnEnemy(type){
    const def=ENEMY_TYPES[type];
    const a=Math.random()*Math.PI*2, r=Utils.rand(30,42);
    const g=new THREE.Group();
    // 身体
    const bodyMat=new THREE.MeshStandardMaterial({color:def.color,roughness:0.7,emissive:new THREE.Color(def.color).multiplyScalar(0.15)});
    const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.5*def.scale,1*def.scale,4,8),bodyMat);
    body.position.y=1*def.scale; body.castShadow=true; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.35*def.scale,12,12),bodyMat); head.position.y=1.9*def.scale; g.add(head);
    // 眼睛发光
    const eyeMat=new THREE.MeshBasicMaterial({color:def.ranged?0xff40ff:0xff3020});
    [-0.15,0.15].forEach(x=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(0.07*def.scale,8,8),eyeMat); e.position.set(x*def.scale,1.95*def.scale,0.3*def.scale); g.add(e); });

    g.position.set(Math.cos(a)*r, 0, Math.sin(a)*r); scene.add(g);
    const maxHp=def.hp*(1+wave*0.08); // 波次成长
    enemies.push({
      obj:g, type, def, hp:maxHp, maxHp, bodyMat,
      pos:g.position, atkTimer:Utils.rand(0,def.atkCd), hitFlash:0,
      telegraphing:0, dead:false,
    });
  }

  // 敌人受击（返回是否致死）
  function damageEnemy(e, dmg, crit){
    if(e.dead) return;
    e.hp-=dmg; e.hitFlash=0.15;
    FloatText.spawn(e.pos.clone().setY(e.pos.y+2), Math.round(dmg).toString(), crit?'#ffdd44':'#ffffff', crit);
    Audio.hit();
    // 吸血
    if(player.lifesteal>0){ healPlayer(player.lifesteal); }
    if(e.hp<=0) killEnemy(e);
  }

  function killEnemy(e){
    e.dead=true; Audio.enemyDie();
    // 溶解爆炸粒子
    particles.push(new ParticleBurst(scene,e.pos.clone().setY(1),{count:40,color:e.def.color,size:0.35,speed:7,life:1}));
    // 掉落经验光圈
    spawnDrop(e.pos.clone(), e.def.xp);
    // 溶解动画：缩放淡出后移除
    e.dissolve=0.6;
    gainXp(0); // 触发 HUD 刷新占位（实际经验在拾取时给）
  }

  /* ---------------- 掉落物系统 ---------------- */
  function spawnDrop(pos, xpVal){
    // 判断是否掉落装备（20% 且未集齐）
    let equipId=null;
    const owned=player.equips;
    const avail=EQUIP_KEYS.filter(k=>!owned.includes(k));
    if(avail.length && Math.random()<0.22) equipId=avail[Utils.randInt(0,avail.length-1)];

    const color=equipId?0xffd27a:0xb06bff;
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.12,8,20),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9}));
    ring.rotation.x=Math.PI/2; ring.position.copy(pos).setY(0.6);
    const light=new THREE.PointLight(color,2,6); ring.add(light);
    scene.add(ring);
    drops.push({obj:ring, pos:ring.position, xp:xpVal, equip:equipId, phase:Utils.rand(0,6.28)});
  }

  function collectDrop(d){
    if(d.equip){
      player.equips.push(d.equip);
      EQUIP_DB[d.equip].apply(player);
      recalcStats();
      refreshInventory();
      showHint(`获得被动：${EQUIP_DB[d.equip].name}`);
    }
    if(d.xp>0) gainXp(d.xp);
    Audio.pickup();
    scene.remove(d.obj);
  }

  /* ---------------- 玩家属性 / 经验 / 升级 ---------------- */
  function recalcStats(){
    // 从基础值重算（先重置乘区，再依次 apply）
    player.atkMul=1; player.speedMul=1; player.crit=0.10; player.lifesteal=0; player.mpCostMul=1;
    player.equips.forEach(id=>EQUIP_DB[id].apply(player));
  }
  function getAtk(){ return player.baseAtk*player.atkMul; }
  function getSpeed(){ return player.baseSpeed*player.speedMul; }

  function gainXp(v){
    player.xp+=v;
    while(player.xp>=player.xpNext){
      player.xp-=player.xpNext; player.level++; player.xpNext=Math.floor(player.xpNext*1.35);
      // 升级奖励
      player.maxHp+=20; player.hp=player.maxHp; player.maxMp+=10; player.mp=player.maxMp; player.baseAtk+=3;
      Audio.levelUp();
      FloatText.spawn(player.pos.clone().setY(3),'升级！','#7affea',true);
      showHint(`⬆ 升到 ${player.level} 级！生命与法力全满`);
    }
    updateHUD();
    autoSave();
  }
  function healPlayer(v){ player.hp=Utils.clamp(player.hp+v,0,player.maxHp); updateHUD(); }
  function damagePlayer(v){
    if(player.invuln>0) return;
    player.hp-=v; player.invuln=0.5;
    Audio.playerHurt();
    // 红屏
    const vig=document.getElementById('damageVignette'); vig.style.opacity='1'; setTimeout(()=>vig.style.opacity='0',150);
    FloatText.spawn(player.pos.clone().setY(2.5),Math.round(v).toString(),'#ff4d6d');
    updateHUD();
    if(player.hp<=0) gameOver();
  }

  /* ---------------- 技能实现 ---------------- */
  function tryCast(idx){
    const s=skills[idx];
    if(s.timer>0) return;
    const cost=s.mp*player.mpCostMul;
    if(player.mp<cost){ showHint('法力不足！'); return; }
    player.mp-=cost; s.timer=s.cd; s.cast(); updateHUD();
    // 快捷栏动画
    const slot=document.querySelector(`.skill-slot[data-skill="${idx}"]`);
    slot.classList.add('casting'); setTimeout(()=>slot.classList.remove('casting'),150);
  }

  // 技能1：火球术 —— 朝准星方向发射爆炸弹
  function castFireball(){
    Audio.castFire();
    const dir=getAimDirection();
    const start=player.pos.clone().setY(1.2).add(dir.clone().multiplyScalar(1));
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.35,12,12),new THREE.MeshBasicMaterial({color:0xff6622}));
    const light=new THREE.PointLight(0xff6622,3,8); mesh.add(light);
    mesh.position.copy(start); scene.add(mesh);
    projectiles.push({obj:mesh,pos:mesh.position,vel:dir.multiplyScalar(24),life:2.5,dmg:getAtk()*1.6,type:'fire',radius:2.5,owner:'player'});
  }

  // 技能2：冰霜新星 —— 以玩家为中心的 AoE 群控 + 伤害
  function castFrostNova(){
    Audio.castFrost();
    const radius=8;
    // 视觉：扩散冰环
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.5,1,48),new THREE.MeshBasicMaterial({color:0x88ddff,side:THREE.DoubleSide,transparent:true,opacity:0.8}));
    ring.rotation.x=-Math.PI/2; ring.position.copy(player.pos).setY(0.1); scene.add(ring);
    let t=0;
    const anim={update:(dt)=>{ t+=dt; const sc=1+t*18; ring.scale.set(sc,sc,sc); ring.material.opacity=Utils.clamp(0.8-t*1.2,0,1); return t<0.7; }, dispose:()=>scene.remove(ring)};
    fxAnims.push(anim);
    particles.push(new ParticleBurst(scene,player.pos.clone().setY(1),{count:50,color:0x88ddff,size:0.3,speed:10,life:0.9,gravity:-1}));
    // 伤害 + 减速（冰冻）
    enemies.forEach(e=>{
      if(e.dead) return;
      if(Utils.dist2D(e.pos,player.pos)<radius){
        const {dmg,crit}=rollDamage(getAtk()*1.2);
        damageEnemy(e,dmg,crit);
        e.frozen=2.0; // 冰冻 2 秒
      }
    });
  }

  // 技能3：闪电冲刺 —— 朝方向瞬移并对路径敌人造成伤害
  function castLightningDash(){
    Audio.castLightning();
    const dir=getAimDirection(); dir.y=0; dir.normalize();
    const dashDist=10;
    const from=player.pos.clone();
    const to=from.clone().add(dir.clone().multiplyScalar(dashDist));
    to.x=Utils.clamp(to.x,-45,45); to.z=Utils.clamp(to.z,-45,45);
    // 闪电拖尾粒子
    for(let i=0;i<8;i++){
      const p=from.clone().lerp(to,i/8).setY(1);
      particles.push(new ParticleBurst(scene,p,{count:8,color:0xffff66,size:0.25,speed:3,life:0.5,gravity:0}));
    }
    // 路径伤害
    enemies.forEach(e=>{
      if(e.dead) return;
      const d=distToSegment(e.pos,from,to);
      if(d<2.5){ const {dmg,crit}=rollDamage(getAtk()*1.4); damageEnemy(e,dmg,crit); }
    });
    player.invuln=0.4; // 冲刺无敌帧
    player.pos.copy(to);
  }

  // 点到线段距离（2D）
  function distToSegment(p,a,b){
    const ap={x:p.x-a.x,z:p.z-a.z}, ab={x:b.x-a.x,z:b.z-a.z};
    const t=Utils.clamp((ap.x*ab.x+ap.z*ab.z)/(ab.x*ab.x+ab.z*ab.z||1),0,1);
    return Math.hypot(ap.x-ab.x*t, ap.z-ab.z*t);
  }

  // 伤害计算（含暴击）
  function rollDamage(base){
    const crit=Math.random()<player.crit;
    return {dmg:base*(crit?2:1)*Utils.rand(0.9,1.1), crit};
  }

  // 获取准星朝向（相机朝向的水平方向 + 俯仰）
  function getAimDirection(){
    const dir=new THREE.Vector3();
    camera.getWorldDirection(dir);
    return dir.normalize();
  }

  /* ---------------- 敌人弹幕（邪教徒） ---------------- */
  function enemyCastBolt(e){
    const dir=player.pos.clone().sub(e.pos).setY(0).normalize();
    const start=e.pos.clone().setY(1.4);
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.3,10,10),new THREE.MeshBasicMaterial({color:0xcc44ff}));
    const light=new THREE.PointLight(0xcc44ff,2,6); mesh.add(light);
    mesh.position.copy(start); scene.add(mesh);
    projectiles.push({obj:mesh,pos:mesh.position,vel:dir.multiplyScalar(12),life:4,dmg:e.def.dmg,type:'dark',radius:0.8,owner:'enemy'});
    Audio.castLightning();
  }

  /* ---------------- 波次系统 ---------------- */
  function startWave(n){
    wave=n; waveActive=true; waveClearTimer=0;
    if(wave>waveHighest){ waveHighest=wave; autoSave(); }
    // 组成：随波次增加数量与种类
    spawnQueue=[];
    const zCount=3+n*2;
    const cCount=Math.max(0,n-1)*1;
    const gCount=n>=3?Math.floor(n/3):0;
    for(let i=0;i<zCount;i++) spawnQueue.push('zombie');
    for(let i=0;i<cCount;i++) spawnQueue.push('cultist');
    for(let i=0;i<gCount;i++) spawnQueue.push('giant');
    // 打乱
    spawnQueue.sort(()=>Math.random()-0.5);
    showHint(`✦ 第 ${n} 波来袭 ✦`);
    updateHUD();
    spawnTimer=0;
  }
  let spawnTimer=0;
  function updateWave(dt){
    // 波次进行中：生成敌人 + 判定清空
    if(waveActive){
      // 逐个放出（间隔生成，制造节奏）
      if(spawnQueue.length){
        spawnTimer-=dt;
        if(spawnTimer<=0){ spawnEnemy(spawnQueue.pop()); spawnTimer=Utils.rand(0.4,1.0); }
      }
      // 全部清空 → 开始下一波倒计时
      const alive=enemies.filter(e=>!e.dead).length;
      document.getElementById('enemyCount').textContent=`剩余敌人 ${alive}`;
      if(spawnQueue.length===0 && alive===0){
        waveActive=false; waveClearTimer=3;
        showHint(`第 ${wave} 波已清空！`);
      }
      return;
    }
    // 波间休整：倒计时结束后进入下一波
    if(waveClearTimer>0){
      document.getElementById('enemyCount').textContent=`下一波 ${Math.ceil(waveClearTimer)} 秒…`;
      waveClearTimer-=dt;
      if(waveClearTimer<=0) startWave(wave+1);
    }
  }

  /* ---------------- 输入处理 ---------------- */
  function bindInput(){
    document.addEventListener('keydown',e=>{
      const k=e.key.toLowerCase(); keys[k]=true;
      if(!running) return;
      if(k==='i'){ toggleInventory(); }
      if(k==='escape' && invOpen){ toggleInventory(); }
      if(k==='1') tryCast(0);
      if(k==='2') tryCast(1);
      if(k==='3') tryCast(2);
      if(k==='v'){ player.thirdPerson=!player.thirdPerson; showHint(player.thirdPerson?'第三人称':'第一人称'); }
    });
    document.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

    const canvas=document.getElementById('gameCanvas');
    canvas.addEventListener('click',()=>{ if(running && !invOpen) canvas.requestPointerLock(); });
    document.addEventListener('mousemove',e=>{
      if(document.pointerLockElement===canvas){
        player.yaw-=e.movementX*0.0025;
        player.pitch-=e.movementY*0.0025;
        player.pitch=Utils.clamp(player.pitch,-1.2,1.2);
      }
    });
    document.addEventListener('mousedown',e=>{ if(e.button===0) mouseDown=true; });
    document.addEventListener('mouseup',e=>{ if(e.button===0) mouseDown=false; });

    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });

    // 亮度滑块
    const br=document.getElementById('brightness');
    br.addEventListener('input',()=>{
      const v=br.value/100;
      ambientLight.intensity=0.6*v; hemiLight.intensity=0.5*v; renderer.toneMappingExposure=v;
      document.getElementById('brVal').textContent=br.value+'%';
    });
  }

  /* ---------------- 玩家移动与相机 ---------------- */
  function updatePlayer(dt){
    if(invOpen) return;
    player.invuln=Math.max(0,player.invuln-dt);
    // 法力自然回复
    player.mp=Utils.clamp(player.mp+8*dt,0,player.maxMp);
    // 生命缓慢回复
    player.hp=Utils.clamp(player.hp+1*dt,0,player.maxHp);

    // 按 yaw 计算前进/右向
    const forward=new THREE.Vector3(Math.sin(player.yaw),0,Math.cos(player.yaw));
    const right=new THREE.Vector3(Math.sin(player.yaw-Math.PI/2),0,Math.cos(player.yaw-Math.PI/2));
    const move=new THREE.Vector3();
    if(keys['w']) move.add(forward);
    if(keys['s']) move.sub(forward);
    if(keys['d']) move.add(right);
    if(keys['a']) move.sub(right);
    if(move.lengthSq()>0){
      move.normalize().multiplyScalar(getSpeed()*dt);
      player.pos.add(move);
      // 边界限制
      const r=Math.hypot(player.pos.x,player.pos.z);
      if(r>46){ player.pos.x*=46/r; player.pos.z*=46/r; }
    }
    // 鼠标左键持续施放火球（普攻手感）
    if(mouseDown) tryCast(0);

    // 更新模型：面朝移动 / 面朝视角
    player.obj.position.copy(player.pos);
    player.obj.rotation.y=player.yaw+Math.PI;

    // 相机跟随
    if(player.thirdPerson){
      // 越肩视角：相机后方 + 向右偏移，让人物不挡准星
      const camDist=6, camHeight=3.2, shoulder=1.4, aimAhead=40;
      const right=new THREE.Vector3(Math.sin(player.yaw-Math.PI/2),0,Math.cos(player.yaw-Math.PI/2));
      const back=new THREE.Vector3(
        -Math.sin(player.yaw)*Math.cos(player.pitch),
        -Math.sin(player.pitch),
        -Math.cos(player.yaw)*Math.cos(player.pitch)
      );
      camera.position.copy(player.pos)
        .add(back.clone().multiplyScalar(camDist))
        .add(right.clone().multiplyScalar(shoulder))
        .setY(player.pos.y + camHeight + Math.sin(player.pitch)*camDist*0.5);
      // 注视前方远处的瞄准点（而非人物），准星始终指向世界空间
      const aimPoint=new THREE.Vector3(
        Math.sin(player.yaw)*Math.cos(player.pitch),
        Math.sin(player.pitch),
        Math.cos(player.yaw)*Math.cos(player.pitch)
      ).multiplyScalar(aimAhead).add(new THREE.Vector3(player.pos.x, player.pos.y+1.5, player.pos.z));
      camera.lookAt(aimPoint);
    }else{
      // 第一人称
      camera.position.copy(player.pos).setY(player.pos.y+0.6);
      const dir=new THREE.Vector3(
        Math.sin(player.yaw)*Math.cos(player.pitch),
        Math.sin(player.pitch),
        Math.cos(player.yaw)*Math.cos(player.pitch)
      );
      camera.lookAt(camera.position.clone().add(dir));
    }
  }

  /* ---------------- 敌人更新 ---------------- */
  function updateEnemies(dt){
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      // 溶解移除
      if(e.dead){
        if(e.dissolve>0){
          e.dissolve-=dt;
          const s=Utils.clamp(e.dissolve/0.6,0,1);
          e.obj.scale.setScalar(s*e.def.scale + 0.001);
          e.obj.position.y=(1-s)*2;
          e.obj.rotation.y+=dt*8;
        }else{ scene.remove(e.obj); enemies.splice(i,1); }
        continue;
      }
      // 受击闪红
      if(e.hitFlash>0){ e.hitFlash-=dt; e.bodyMat.emissive.setRGB(0.8,0.1,0.1); }
      else e.bodyMat.emissive.copy(new THREE.Color(e.def.color).multiplyScalar(0.15));

      // 冰冻减速
      let spdMul=1;
      if(e.frozen>0){ e.frozen-=dt; spdMul=0.3; e.bodyMat.emissive.setRGB(0.2,0.5,0.8); }

      const toPlayer=player.pos.clone().sub(e.pos).setY(0);
      const distXZ=toPlayer.length();
      const dir=toPlayer.normalize();

      // 面朝玩家
      e.obj.rotation.y=Math.atan2(dir.x,dir.z);
      // 上下起伏动画（僵尸步态）
      e.obj.position.y=Math.abs(Math.sin(Utils.now()*4+i))*0.1;

      if(e.def.ranged){
        // 邪教徒：保持距离
        if(distXZ>e.def.atkRange) e.pos.add(dir.multiplyScalar(e.def.speed*spdMul*dt));
        else if(distXZ<8) e.pos.sub(dir.multiplyScalar(e.def.speed*spdMul*dt)); // 太近后撤
        e.atkTimer-=dt;
        if(e.atkTimer<=0 && distXZ<=e.def.atkRange){ enemyCastBolt(e); e.atkTimer=e.def.atkCd; }
      }else{
        // 近战：靠近
        if(distXZ>e.def.atkRange){
          // 巨兽攻击预警时停步
          if(e.telegraphing>0){ e.telegraphing-=dt; }
          else e.pos.add(dir.multiplyScalar(e.def.speed*spdMul*dt));
        }else{
          e.atkTimer-=dt;
          if(e.def.telegraph){
            // 巨兽：先预警再打
            if(e.telegraphing<=0 && e.atkTimer<=0.8){ e.telegraphing=0.8; showTelegraph(e); }
            if(e.telegraphing>0){ e.telegraphing-=dt; if(e.telegraphing<=0){ if(distXZ<=e.def.atkRange) damagePlayer(e.def.dmg); e.atkTimer=e.def.atkCd; } }
            else if(e.atkTimer<=0){ /* 等待进入预警 */ }
          }else{
            if(e.atkTimer<=0){ damagePlayer(e.def.dmg); e.atkTimer=e.def.atkCd; }
          }
        }
      }
      e.obj.position.x=e.pos.x; e.obj.position.z=e.pos.z;
    }
  }

  // 巨兽攻击预警：地面红圈
  function showTelegraph(e){
    const ring=new THREE.Mesh(new THREE.RingGeometry(1,e.def.atkRange,32),new THREE.MeshBasicMaterial({color:0xff2020,side:THREE.DoubleSide,transparent:true,opacity:0.5}));
    ring.rotation.x=-Math.PI/2; ring.position.copy(e.pos).setY(0.05); scene.add(ring);
    let t=0; fxAnims.push({update:(dt)=>{ t+=dt; ring.material.opacity=0.5*(1-t/0.8); return t<0.8; },dispose:()=>scene.remove(ring)});
    Audio.castLightning();
  }

  /* ---------------- 弹幕更新 ---------------- */
  function updateProjectiles(dt){
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i]; p.life-=dt;
      p.pos.add(p.vel.clone().multiplyScalar(dt));
      p.obj.position.copy(p.pos);
      let hit=false;
      if(p.owner==='player'){
        for(const e of enemies){
          if(e.dead) continue;
          if(Utils.dist2D(e.pos,p.pos)<1+p.radius*0.3 && Math.abs(e.pos.y+1-p.pos.y)<2){
            hit=true;
            // 火球 AoE
            if(p.type==='fire'){
              particles.push(new ParticleBurst(scene,p.pos.clone(),{count:35,color:0xff6622,size:0.4,speed:8,life:0.8}));
              enemies.forEach(t=>{ if(!t.dead && Utils.dist2D(t.pos,p.pos)<p.radius){ const {dmg,crit}=rollDamage(p.dmg); damageEnemy(t,dmg,crit); } });
            }else{ const {dmg,crit}=rollDamage(p.dmg); damageEnemy(e,dmg,crit); }
            break;
          }
        }
      }else{
        // 敌方弹幕命中玩家
        if(Utils.dist2D(player.pos,p.pos)<1.2 && Math.abs(player.pos.y+1-p.pos.y)<2){
          hit=true; damagePlayer(p.dmg);
          particles.push(new ParticleBurst(scene,p.pos.clone(),{count:15,color:0xcc44ff,size:0.3,speed:5,life:0.6}));
        }
      }
      if(hit || p.life<=0){ scene.remove(p.obj); projectiles.splice(i,1); }
    }
  }

  /* ---------------- 掉落物更新（旋转 + 吸附拾取） ---------------- */
  function updateDrops(dt){
    for(let i=drops.length-1;i>=0;i--){
      const d=drops[i]; d.phase+=dt;
      d.obj.rotation.z+=dt*2; d.obj.position.y=0.6+Math.sin(d.phase*2)*0.15;
      const dist=Utils.dist2D(d.pos,player.pos);
      if(dist<3){ // 磁吸
        const dir=player.pos.clone().sub(d.pos).setY(0).normalize();
        d.pos.add(dir.multiplyScalar(10*dt)); d.obj.position.x=d.pos.x; d.obj.position.z=d.pos.z;
      }
      if(dist<1.2){ collectDrop(d); drops.splice(i,1); }
    }
  }

  /* ---------------- 特效动画容器（一次性视觉） ---------------- */
  const fxAnims=[];
  function updateFx(dt){
    for(let i=fxAnims.length-1;i>=0;i--){ if(!fxAnims[i].update(dt)){ fxAnims[i].dispose(); fxAnims.splice(i,1); } }
    for(let i=particles.length-1;i>=0;i--){ if(!particles[i].update(dt)){ particles[i].dispose(); particles.splice(i,1); } }
  }

  /* ---------------- 水晶悬浮动画 ---------------- */
  function updateCrystals(dt){
    const t=Utils.now();
    crystals.forEach(c=>{ c.mesh.position.y=c.baseY+Math.sin(t+c.phase)*0.4; c.mesh.rotation.y+=dt*0.6; });
    if(player.orb) player.orb.rotation.y+=dt*3;
  }

  /* ---------------- 技能冷却更新 + UI ---------------- */
  function updateSkills(dt){
    skills.forEach((s,i)=>{
      if(s.timer>0) s.timer-=dt;
      const slot=document.querySelector(`.skill-slot[data-skill="${i}"]`);
      const cd=slot.querySelector('.cd');
      if(s.timer>0){ cd.style.display='flex'; cd.textContent=s.timer.toFixed(1); slot.classList.remove('ready'); }
      else{ cd.style.display='none'; slot.classList.add('ready'); }
    });
  }

  /* =============== HUD / UI 刷新 =============== */
  function updateHUD(){
    document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';
    document.getElementById('mpFill').style.width=(player.mp/player.maxMp*100)+'%';
    document.getElementById('xpFill').style.width=(player.xp/player.xpNext*100)+'%';
    document.getElementById('hpText').textContent=`${Math.ceil(player.hp)}/${player.maxHp}`;
    document.getElementById('mpText').textContent=`${Math.ceil(player.mp)}/${player.maxMp}`;
    document.getElementById('xpText').textContent=`${Math.floor(player.xp)}/${player.xpNext}`;
    document.getElementById('lvNum').textContent=player.level;
    document.getElementById('stAtk').textContent=Math.round(getAtk());
    document.getElementById('stSpd').textContent=getSpeed().toFixed(1);
    document.getElementById('stCrit').textContent=Math.round(player.crit*100)+'%';
    document.getElementById('waveNum').textContent=wave;
  }

  let hintTimer=null;
  function showHint(txt){
    const h=document.getElementById('hint'); h.textContent=txt; h.classList.add('show');
    clearTimeout(hintTimer); hintTimer=setTimeout(()=>h.classList.remove('show'),2200);
  }

  /* =============== 背包 =============== */
  let invOpen=false;
  function toggleInventory(){
    invOpen=!invOpen;
    document.getElementById('inventory').classList.toggle('open',invOpen);
    if(invOpen){ document.exitPointerLock(); refreshInventory(); }
    else{ document.getElementById('gameCanvas').requestPointerLock(); }
  }
  function refreshInventory(){
    const grid=document.getElementById('equipGrid'); grid.innerHTML='';
    const total=12;
    for(let i=0;i<total;i++){
      const slot=document.createElement('div'); slot.className='inv-slot';
      const id=player.equips[i];
      if(id){
        const e=EQUIP_DB[id]; slot.classList.add('filled'); slot.textContent=e.icon;
        slot.addEventListener('mouseenter',ev=>showTooltip(ev,e.name,e.desc));
        slot.addEventListener('mousemove',moveTooltip);
        slot.addEventListener('mouseleave',hideTooltip);
      }
      grid.appendChild(slot);
    }
  }
  const tt=document.getElementById('tooltip');
  function showTooltip(ev,name,desc){ tt.querySelector('.tt-name').textContent=name; tt.querySelector('.tt-desc').textContent=desc; tt.style.display='block'; moveTooltip(ev); }
  function moveTooltip(ev){ tt.style.left=(ev.clientX+16)+'px'; tt.style.top=(ev.clientY+16)+'px'; }
  function hideTooltip(){ tt.style.display='none'; }

  /* =============== 存档 =============== */
  function autoSave(){
    Save.write({
      level:player.level, maxHp:player.maxHp, maxMp:player.maxMp, baseAtk:player.baseAtk,
      xp:player.xp, xpNext:player.xpNext, equips:player.equips.slice(), waveHighest:waveHighest,
    });
  }
  function applySave(d){
    player.level=d.level||1; player.maxHp=d.maxHp||100; player.maxMp=d.maxMp||100;
    player.baseAtk=d.baseAtk||10; player.xp=d.xp||0; player.xpNext=d.xpNext||100;
    player.equips=(d.equips||[]).filter(id=>EQUIP_DB[id]);
    waveHighest=d.waveHighest||0;
    recalcStats();
    player.hp=player.maxHp; player.mp=player.maxMp;
  }

  /* =============== 游戏流程 =============== */
  function resetRun(){
    // 清理场景中的敌人/弹幕/掉落/粒子
    enemies.forEach(e=>scene.remove(e.obj)); enemies=[];
    projectiles.forEach(p=>scene.remove(p.obj)); projectiles=[];
    drops.forEach(d=>scene.remove(d.obj)); drops=[];
    particles.forEach(p=>p.dispose()); particles=[];
    fxAnims.forEach(f=>f.dispose()); fxAnims.length=0;
    FloatText.clear();
    player.pos.set(0,1,0); player.yaw=0; player.pitch=0;
    player.hp=player.maxHp; player.mp=player.maxMp; player.invuln=0;
    skills.forEach(s=>s.timer=0);
  }

  function startGame(fromSave){
    if(fromSave){ const d=Save.load(); if(d) applySave(d); }
    else{
      // 新游戏：重置全部属性
      Object.assign(player,{level:1,maxHp:100,hp:100,maxMp:100,mp:100,xp:0,xpNext:100,baseAtk:10,equips:[]});
      recalcStats(); waveHighest=0; Save.clear();
    }
    resetRun();
    running=true; paused=false;
    // 显示 UI
    ['hud','stats','settings','skillBar'].forEach(id=>document.getElementById(id).classList.add('active'));
    document.getElementById('crosshair').classList.add('active');
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    updateHUD(); refreshInventory();
    Audio.startAmbient();
    startWave(1);
    document.getElementById('gameCanvas').requestPointerLock();
    showHint('WASD 移动 · 鼠标转向 · 1/2/3 技能 · I 背包 · V 切换视角');
  }

  function gameOver(){
    running=false; document.exitPointerLock();
    Save.clear(); // 死亡清空存档
    document.getElementById('gameOverStats').innerHTML=
      `到达 <b>第 ${wave} 波</b> · 等级 <b>${player.level}</b><br>已获被动 <b>${player.equips.length}</b> 件`;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    ['hud','stats','settings','skillBar'].forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById('crosshair').classList.remove('active');
  }

  /* =============== 主循环 =============== */
  function loop(){
    requestAnimationFrame(loop);
    const dt=Math.min(clock.getDelta(),0.05); // 限制最大步长防卡顿穿透
    updateCrystals(dt);
    if(running && !invOpen){
      updatePlayer(dt);
      updateEnemies(dt);
      updateProjectiles(dt);
      updateDrops(dt);
      updateWave(dt);
      updateSkills(dt);
      updateHUD();
    }
    updateFx(dt);
    FloatText.update(dt,camera);
    renderer.render(scene,camera);
  }

  /* =============== 初始化入口 =============== */
  function init(){
    buildScene();
    bindInput();
    // 菜单按钮
    document.getElementById('btnNew').addEventListener('click',()=>{ Audio.ensure(); startGame(false); });
    const cont=document.getElementById('btnContinue');
    document.getElementById('btnRestart').addEventListener('click',()=>{
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('menuScreen').classList.remove('hidden');
      refreshMenu();
    });
    cont.addEventListener('click',()=>{ if(Save.exists()){ Audio.ensure(); startGame(true); } });
    refreshMenu();
    document.getElementById('loading').style.display='none';
    loop();
  }

  // 刷新主菜单（继续游戏按钮状态 + 存档信息）
  function refreshMenu(){
    const cont=document.getElementById('btnContinue');
    const info=document.getElementById('saveInfo');
    if(Save.exists()){
      const d=Save.load(); cont.disabled=false;
      info.innerHTML=`存档：等级 ${d.level} · 最大生命 ${d.maxHp} · 被动 ${(d.equips||[]).length} 件 · 最高波次 ${d.waveHighest||0}`;
    }else{ cont.disabled=true; info.textContent='暂无存档 — 开始你的第一次远征'; }
  }

  return {init};
})();

// 启动
Game.init();
</script>
</body>
